<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok — Log in</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #fff;
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }

        nav {
            height: 60px;
            border-bottom: 1px solid #f1f1f2;
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 22px;
            font-weight: 700;
            color: #000;
            text-decoration: none;
        }

        .nav-logo svg { width: 32px; height: 32px; }

        .page {
            flex: 1;
            display: flex;
            align-items: stretch;
        }

        .banner {
            flex: 1;
            background: linear-gradient(160deg, #010101 0%, #1b0010 50%, #010101 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            min-height: 600px;
        }

        @media (max-width: 768px) { .banner { display: none; } }

        .banner-inner { max-width: 440px; }

        .banner-title {
            font-size: 36px;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .banner-title span { color: #fe2c55; }

        .banner-sub {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .phone-frame {
            width: 200px;
            height: 360px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 28px;
            background: #111;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(254,44,85,0.2);
        }

        .phone-notch {
            width: 70px; height: 18px;
            background: #000;
            border-radius: 0 0 12px 12px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .phone-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
        }

        .phone-video {
            width: 100%; height: 200px;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn::after {
            content: "";
            width: 0; height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 16px solid #fff;
            margin-left: 3px;
        }

        .phone-likes {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .panel {
            width: 440px;
            min-width: 360px;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-left: 1px solid #f1f1f2;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .panel { width: 100%; min-width: 0; border-left: none; }
        }

        .panel-title {
            font-size: 28px;
            font-weight: 700;
            color: #161823;
            margin-bottom: 32px;
            text-align: center;
            line-height: 1.3;
        }

        .method-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #f1f1f2;
            width: 100%;
            margin-bottom: 28px;
        }

        .method-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 600;
            color: #8e8e93;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.15s, border-color 0.15s;
        }

        .method-tab.active {
            color: #161823;
            border-bottom-color: #161823;
        }

        form { width: 100%; }

        .field {
            position: relative;
            margin-bottom: 12px;
        }

        .field input {
            width: 100%;
            border: 1px solid #d1d1d6;
            border-radius: 4px;
            padding: 14px 44px 14px 14px;
            font-size: 15px;
            color: #161823;
            outline: none;
            background: #fff;
            transition: border-color 0.15s;
        }

        .field input::placeholder { color: #8e8e93; }
        .field input:focus { border-color: #161823; }

        .field-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e93;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
        }

        .field-icon:hover { color: #161823; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #fe2c55;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.15s, opacity 0.15s;
        }

        .btn-login:hover:not(:disabled) { background: #e6254c; }
        .btn-login:disabled { opacity: 0.4; cursor: default; }

        .forgot-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .forgot-row a {
            font-size: 13px;
            color: #fe2c55;
            text-decoration: none;
            font-weight: 600;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            margin: 20px 0;
        }

        .divider::before, .divider::after {
            content: ""; flex: 1; height: 1px; background: #d1d1d6;
        }

        .divider span { font-size: 13px; color: #8e8e93; font-weight: 500; }

        .social-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px;
            border: 1px solid #d1d1d6;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            color: #161823;
            background: #fff;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.1s;
        }

        .social-btn:hover { background: #f7f7f7; }

        .result {
            display: none;
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.5;
            width: 100%;
            animation: fadein 0.25s ease;
        }

        @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

        .result.valid   { background: #e8f8f0; border: 1px solid #b2dfce; color: #1a5c3a; }
        .result.warning { background: #fff8e6; border: 1px solid #ffe082; color: #7a5a00; }
        .result.error   { background: #fff0f2; border: 1px solid #ffb3be; color: #8b0000; }

        .result strong { display: block; font-weight: 700; margin-bottom: 4px; }

        .acc-table { width: 100%; margin-top: 12px; font-size: 13px; border-collapse: collapse; }
        .acc-table td { padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
        .acc-table td:first-child { color: #8e8e93; width: 50%; }
        .acc-table td:last-child { font-weight: 600; }
        .acc-table tr:last-child td { border-bottom: none; }

        .signup-row {
            margin-top: 32px;
            font-size: 14px;
            color: #8e8e93;
            text-align: center;
        }

        .signup-row a { color: #fe2c55; font-weight: 600; text-decoration: none; }

        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav>
        <a class="nav-logo" href="/">
            <svg viewBox="0 0 32 32" fill="none">
                <path d="M22.5 4C22.5 4 22.9 8.5 27.5 9.5V14C27.5 14 24.5 14 22.5 12.5V20C22.5 25.5 18.3 30 13 30C7.7 30 3.5 25.5 3.5 20C3.5 14.5 7.7 10 13 10C13.5 10 14 10 14.5 10.1V15C14 14.9 13.5 14.8 13 14.8C10.5 14.8 8.5 17 8.5 19.5C8.5 22 10.5 24 13 24C15.5 24 17.5 22 17.5 19.5V4H22.5Z" fill="#fe2c55"/>
                <path d="M21.5 3C21.5 3 21.9 7.5 26.5 8.5V13C26.5 13 23.5 13 21.5 11.5V19C21.5 24.5 17.3 29 12 29C6.7 29 2.5 24.5 2.5 19C2.5 13.5 6.7 9 12 9C12.5 9 13 9 13.5 9.1V14C13 13.9 12.5 13.8 12 13.8C9.5 13.8 7.5 16 7.5 18.5C7.5 21 9.5 23 12 23C14.5 23 16.5 21 16.5 18.5V3H21.5Z" fill="#25f4ee" style="mix-blend-mode:screen"/>
                <path d="M22 3.5C22 3.5 22.4 8 27 9V13.5C27 13.5 24 13.5 22 12V19.5C22 25 17.8 29.5 12.5 29.5C7.2 29.5 3 25 3 19.5C3 14 7.2 9.5 12.5 9.5C13 9.5 13.5 9.5 14 9.6V14.5C13.5 14.4 13 14.3 12.5 14.3C10 14.3 8 16.5 8 19C8 21.5 10 23.5 12.5 23.5C15 23.5 17 21.5 17 19V3.5H22Z" fill="#161823"/>
            </svg>
            TikTok
        </a>
    </nav>

    <div class="page">

        <div class="banner">
            <div class="banner-inner">
                <div class="banner-title">Verify TikTok<br><span>Credentials</span></div>
                <p class="banner-sub">Check whether a TikTok username and password combination is valid using Lamatok API.</p>
                <div class="phone-frame">
                    <div class="phone-notch"></div>
                    <div class="phone-screen">
                        <div class="phone-video">
                            <div class="play-btn"></div>
                        </div>
                        <div class="phone-likes">
                            <span>❤️ 128.4K</span>
                            <span>💬 4.2K</span>
                            <span>↗ Share</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Log in to TikTok</div>

            <div class="method-tabs">
                <div class="method-tab active">Email / Username</div>
                <div class="method-tab" style="color:#d1d1d6;cursor:default">QR Code</div>
            </div>

            <form id="ttForm" style="width:100%">
                <div class="field">
                    <input type="text" id="username" placeholder="Email address" autocomplete="off" autocapitalize="none" required />
                </div>

                <div class="field">
                    <input type="password" id="password" placeholder="Password" autocomplete="off" required />
                    <button type="button" class="field-icon" id="togglePw">Show</button>
                </div>

                <div class="forgot-row">
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login" id="submitBtn" disabled>Log in</button>
            </form>

            <div class="result" id="result"></div>

            <div class="divider"><span>OR</span></div>

            <button class="social-btn" type="button">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Continue with Google
            </button>

            <button class="social-btn" type="button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Continue with Facebook
            </button>

            <div class="signup-row">
                Don't have an account? <a href="#">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        const usernameEl = document.getElementById('username');
        const pwEl = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const togglePw = document.getElementById('togglePw');
        const result = document.getElementById('result');
        const form = document.getElementById('ttForm');

        function updateBtn() {
            submitBtn.disabled = !(usernameEl.value.trim() && pwEl.value);
        }

        usernameEl.addEventListener('input', updateBtn);
        pwEl.addEventListener('input', updateBtn);

        togglePw.addEventListener('click', () => {
            const isText = pwEl.type === 'text';
            pwEl.type = isText ? 'password' : 'text';
            togglePw.textContent = isText ? 'Show' : 'Hide';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameEl.value.trim();
            const password = pwEl.value;
            if (!username || !password) return;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Checking…';
            result.style.display = 'none';

            try {
                const res = await fetch('/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: username, password }),
                });
                const data = await res.json();
                showResult(data);
            } catch {
                showResult({ success: false, message: 'Network error. Please try again.' });
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log in';
            }
        });

        function showResult(data) {
            const status = data.status || '';
            const isWarning = ['captcha_required', '2fa_required'].includes(status);
            const isValid = data.success && !isWarning;

            result.className = 'result ' + (isValid ? 'valid' : isWarning ? 'warning' : 'error');
            result.style.display = 'block';

            const icon = isValid ? '✓' : isWarning ? '⚠' : '✕';
            const label = isValid ? 'Valid credentials' : isWarning ? 'Credentials valid — extra step needed' : 'Login failed';

            let html = `<strong>${icon} ${label}</strong>${esc(data.message || '')}`;

            if (data.account) {
                const a = data.account;
                html += `
                    <table class="acc-table">
                        <tr><td>Username</td><td>@${esc(a.username || '—')}</td></tr>
                        <tr><td>Nickname</td><td>${esc(a.nickname || '—')}</td></tr>
                        <tr><td>Followers</td><td>${fmt(a.followers)}</td></tr>
                        <tr><td>Following</td><td>${fmt(a.following)}</td></tr>
                        <tr><td>Verified</td><td>${a.is_verified ? 'Yes' : 'No'}</td></tr>
                    </table>`;
            }

            result.innerHTML = html;
        }

        function esc(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
        function fmt(n) {
            return n != null ? Number(n).toLocaleString() : '—';
        }
    </script>
</body>
</html>
